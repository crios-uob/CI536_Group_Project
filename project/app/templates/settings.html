<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title> CI536 Project</title>
    <link rel="stylesheet" href="{% static 'app/css/file.css' %}">
</head>
<body>


<div class="wrapper">

    <div class = "sidebar">
        <h1> FlashLearn </h1>
        <a href = "{% url 'file' %}">Overview Page</a>
        <a href = "{% url 'decks' %}">My decks</a>
        <a href = "{% url 'flashcards' %}">Flashcards</a>
        <a href = "{% url 'analytics' %}">Analytics</a>
        <a href = "#">About</a>
        <a href = "{% url 'settings' %}">Settings</a>
    </div>

    <div class="main">
        <h2> Settings</h2>
        <p> Manage your account settings and preferences. </p>

        <div class="settings-section">
            <h3> Account Details</h3>
            <div class="settings-row">
                <label> Username</label>
                <input type="text" placeholder="Enter new username">
                <button>Save</button>
            </div>
            <div class="settings-row">
                <label>Password</label>
                <input type="password" placeholder="Enter new password">
                <button>Save</button>
            </div>
        </div>

        <div class="settings-section">
            <h3> Reset options</h3>
            <div class="settings-row">
                <label> Reset Analytics </label>
                <!-- TODO (backend): analytic reset function -->
                <button class="btn-danger">Reset</button>
            </div>
            <div class="settings-row">
                <label> Reset All Decks</label>
                <!-- TODO (backend): deck reset function -->
                <button class="btn-danger">Reset</button>
            </div>
        </div>

    </div>

</div>
</body>
</html>
