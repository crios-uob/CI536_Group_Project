<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <title>Quiz</title>
    <link rel="stylesheet" href="{% static 'app/css/file.css' %}">
</head>
<body>

<div class="wrapper">

    <div class="sidebar">
        <h1>CENJ</h1>
        <a href="{% url 'file' %}">Overview</a>
        <a href="{% url 'decks' %}">Decks</a>
    </div>

    <div class="main">

        <div id="deck-data" data-deck-id="{{ deck.id }}"></div>

        <h2>{{ deck.name }} Quiz</h2>

        <div id="quiz-box">
            <p id="question"></p>

            <input type="text" id="user-answer" placeholder="Your answer">
            <button onclick="submitAnswer()">Submit</button>
        </div>

        <p id="feedback"></p>
        <p id="score"></p>

    </div>

</div>

{{ cards|json_script:"cards-data" }}
<script>

    // Get deck ID from HTML data attribute
    const deckId = document
        .getElementById("deck-data")
        .dataset.deckId;

    // ================= DATA FROM DJANGO =================
    // flashcard data
    const cards = JSON.parse(
    document.getElementById("cards-data").textContent
);
    
    // ================= STATE =================
    let index = 0; // current question index
    let score = 0; // user score tracker

    // ================= DISPLAY QUESTION =================
    function displayQuestion() {

        if (index >= cards.length) {
            endQuiz();
            return;
        }

        // show question or answer depending on state
        document.getElementById("question").innerText =
            cards[index].question;

        // reset input + feedback for next question
        document.getElementById("user-answer").value = "";
        document.getElementById("feedback").innerText = "";
    }

    // ================= SUBMIT ANSWER =================
    function submitAnswer() {
        // get user input and normalise (case insensitive)
        let userAnswer = document.getElementById("user-answer").value.trim().toLowerCase();
        let correctAnswer = cards[index].answer.trim().toLowerCase();

        // compare answers
        if (userAnswer === correctAnswer) {
            score++; // if score correct add 1
            document.getElementById("feedback").innerText = "Correct!";
        } else {
            document.getElementById("feedback").innerText =
                "Wrong! Answer: " + cards[index].answer;
        }

        // after short delay move to next question
        index++;
        setTimeout(displayQuestion, 1000);
    }

    // ================= END QUIZ =================
    function endQuiz() {
    
        //show completion message
        document.getElementById("quiz-box").innerHTML =
            "<h3>Quiz Complete!</h3>";

        // show final score
        document.getElementById("score").innerText =
            "Score: " + score + " / " + cards.length;

        // ================= SAVE RESULT =================
        // Send result to Django
        fetch("/save-result/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": getCSRFToken() // needed for Django security
            },
            body: JSON.stringify({
                score: score,
                total: cards.length,
                deck_id: deckId
            })
        });
    }
    // ================= CSRF HELPER =================
    // extract CSRF token from browser cookies for secure POST requests
    function getCSRFToken() {
        return document.cookie.split('; ')
            .find(row => row.startsWith('csrftoken='))
            .split('=')[1];
    }

    // start quiz on page load
    displayQuestion();

</script>

</body>
</html>
