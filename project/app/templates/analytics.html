<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Analytics</title>
    <link rel="stylesheet" href="{% static 'app/css/styles.css' %}">
</head>
<body>


<div class="wrapper">

    <div class = "sidebar">
        <h1> FlashLearn </h1>
        <a href = "{% url 'overview' %}">Overview Page</a>
        <a href = "{% url 'decks' %}">My decks</a>
        <a href = "{% url 'analytics' %}">Analytics</a>
        <a href = "{% url 'profile' %}">Profile</a>
        <a href = "{% url 'settings' %}">Settings</a>
        <a href = "{% url 'account_login' %}">Log In</a>

        <button id="theme-toggle" onclick="toggleTheme()"> Dark Mode</button>
    </div>

    <div class="main">
        <h2> Analytics</h2>
        <p>Gather all cards of your choosing to form the perfect revision deck.</p>
        <p>Have a glance at your study stats.</p>
        <h2>Recent Scores</h2>
            <!-- Importing CDN for graph--> 
            <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0"></script> 
            <canvas> 
                id="graph" style="width:100%;max-width:700px"  
            </canvas> 
             
            <script> 
                const labels = {{ labels|safe }};  
                const scores = {{ scores|safe }};  
                console.log(labels); 
                console.log(scores); 
                const ctx = document.getElementById('graph');  
 
                new Chart(ctx, { 
                    type: 'line', 
                    data: { 
                        labels: labels,  
 
                        datasets: [{ 
                            label: 'Average Score', 
                            data: scores, 
                            borderColor: 'blue', 
                            borderWidth: 2, 
                            fill: false 
                        }] 
                    }, 
                    options: { 
                        responsive: true 
                    } 
                }); 
            </script>
    </div>

</div>

<script>
    if (localStorage.getItem('theme') === 'dark'){
        document.body.classList.add('dark-mode');
        document.getElementById('theme-toggle').textContext = ' Light Mode';
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('theme-toggle').textContent = isDark ? ' Light Mode' : ' Dark Mode';
    }

</script>

</body>
</html>
