{% load static %}
{% load socialaccount %}

<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="{% static 'app/css/styles.css' %}">
</head>
<body>

<div class="dashboard-hero">
    <div class="dashboard-card">
        <h1>Sign Up</h1>
        <p>Create an account or sign up with Google.</p>

        <form class="auth-form" action="{% url 'account_signup' %}" method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-primary" type="submit">
                Create Account
            </button>
        </form>

        <div class="auth-divider">
            <span>or</span>
        </div>

        <div class="auth-actions">
            <a class="btn btn-secondary" href="{% provider_login_url 'google' process='signup' %}">
                Sign Up with Google
            </a>
        </div>

        <p class="auth-switch">
            <a href="{% url 'account_login' %}">
                Already have an account?
            </a>
        </p>
    </div>
</div>

</body>
</html>
