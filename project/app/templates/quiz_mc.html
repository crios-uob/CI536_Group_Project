<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <title>MC Quiz</title>
</head>
<body>

<h2>{{ deck.name }} (Multiple Choice)</h2>

<p id="question"></p>

<div id="choices"></div>

<p id="feedback"></p>
<p id="score"></p>

<script>

const cards = [
    {% for card in cards %}
    {
        question: "{{ card.question|escapejs }}",
        answer: "{{ card.answer|escapejs }}"
    },
    {% endfor %}
];

let index = 0;
let score = 0;

// Generate fake options
function generateChoices(correctAnswer) {
    let options = [correctAnswer];

    while (options.length < 4) {
        let randomCard = cards[Math.floor(Math.random() * cards.length)];
        let option = randomCard.answer;

        if (!options.includes(option)) {
            options.push(option);
        }
    }

    return options.sort(() => Math.random() - 0.5);
}

function displayQuestion() {
    if (index >= cards.length) {
        endQuiz();
        return;
    }

    document.getElementById("question").innerText =
        cards[index].question;

    const choicesDiv = document.getElementById("choices");
    choicesDiv.innerHTML = "";

    let options = generateChoices(cards[index].answer);

    options.forEach(option => {
        let btn = document.createElement("button");
        btn.innerText = option;
        btn.onclick = () => checkAnswer(option);
        choicesDiv.appendChild(btn);
    });
}

function checkAnswer(selected) {
    let correct = cards[index].answer;

    if (selected === correct) {
        score++;
        document.getElementById("feedback").innerText = "Correct!";
    } else {
        document.getElementById("feedback").innerText =
            "Wrong! Answer: " + correct;
    }

    index++;
    setTimeout(displayQuestion, 1000);
}

function endQuiz() {
    document.getElementById("question").innerText = "Quiz Finished!";
    document.getElementById("choices").innerHTML = "";
    document.getElementById("score").innerText =
        "Score: " + score + " / " + cards.length;

    // Save result
    fetch("/save-result/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            score: score,
            total: cards.length,
            deck_id: {{ deck.id }}
        })
    });
}

function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        .split('=')[1];
}

displayQuestion();

</script>

</body>
</html>
