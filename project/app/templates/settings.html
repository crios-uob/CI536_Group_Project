<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="{% static 'app/css/styles.css' %}">
</head>
<body>


<div class="wrapper">

    <div class = "sidebar">
        <h1> FlashLearn </h1>
        <a href = "{% url 'overview' %}">Overview Page</a>
        <a href = "{% url 'decks' %}">My decks</a>

        <a href = "{% url 'analytics' %}">Analytics</a>
        <a href = "{% url 'profile' %}">Profile</a>
        <a href = "{% url 'settings' %}">Settings</a>
        <a href = "{% url 'account_login' %}">Log In</a>

        <button id="theme-toggle" onclick="toggleTheme()"> Dark Mode</button>
    </div>

    <div class="main">
        <h2> Settings</h2>
        <p> Manage your account settings and preferences. </p>

        <div class="settings-section">
            <h3> Account Details</h3>
            <div class="settings-row">
                <label> Username</label>
                <input type="text" placeholder="Enter new username">
                <button>Save</button>
            </div>
            <div class="settings-row">
                <label>Password</label>
                <input type="password" placeholder="Enter new password">
                <button>Save</button>
            </div>
        </div>

        <div class="settings-section">
            <h3> Reset options</h3>
            <div class="settings-row">
                <label> Reset Analytics </label>
                <!-- TODO (backend): analytic reset function -->
                <button class="btn-danger">Reset</button>
            </div>
            <div class="settings-row">
                <label> Reset All Decks</label>
                <!-- TODO (backend): deck reset function -->
                <button class="btn-danger">Reset</button>
            </div>
        </div>

    </div>

</div>

<script>
    if (localStorage.getItem('theme') === 'dark'){
        document.body.classList.add('dark-mode');
        document.getElementById('theme-toggle').textContext = ' Light Mode';
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('theme-toggle').textContent = isDark ? ' Light Mode' : ' Dark Mode';
    }

</script>

</body>
</html>
