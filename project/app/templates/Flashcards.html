<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <title>CI536 Project</title>
    <link rel="stylesheet" href="{% static 'app/css/file.css' %}">
</head>

<body>

<div class="wrapper">

    <div class="sidebar">
        <h1>FlashLearn</h1>

        <a href="{% url 'file' %}">Overview Page</a>
        <a href="{% url 'decks' %}">My decks</a>

        <a href="{% url 'analytics' %}">Analytics</a>
        <a href="#">About</a>
        <a href="{% url 'settings' %}">Settings</a>
    </div>

    <div class="main">

        <!-- Display deck name dynamically -->
        <h2>{{ deck.name }}</h2>

        <!-- Flashcard display box -->
        <div id="flashcard-box">
            <p id="card-text">Loading...</p>
        </div>

        <!-- Controls -->
        <button onclick="prevCard()">Previous</button>
        <button onclick="flipCard()">Reveal</button>
        <button onclick="nextCard()">Next</button>

        <a href="{% url 'add_card' deck.id %}">
            <button>Add Card</button>
        </a>

        <hr>

        <h3>Manage Cards</h3>

        {% for card in cards %}

        <div class="card-manager">

            <p>
                <strong>Q:</strong> {{ card.question }}
            </p>

            <p>
                <strong>A:</strong> {{ card.answer }}
            </p>

            <!-- Edit button -->
            <a href="{% url 'edit_card' card.id %}">
                <button>Edit</button>
            </a>

            <!-- Delete button -->
            <a href="{% url 'delete_card' card.id %}"
                onclick="return confirm('Delete this card?')">

                <button>Delete</button>

            </a>

        </div>

        <hr>

        {% endfor %}

    </div>

</div>

{{ cards|json_script:"cards-data" }}
<script>

    // ================= DATA FROM DJANGO =================
    // Convert Django data into JavaScript array
    const cards = JSON.parse(
    document.getElementById("cards-data").textContent
);

    // ================= STATE VARIABLES =================
    let index = 0;  // track current card index
    let showingAnswer = false;  // track whether answer is showing


    // ================= DISPLAY FUNCTION =================
    function displayCard() {

        // If no cards exist
        if (cards.length === 0) {
            document.getElementById("card-text").innerText = "No cards available.";
            return;
        }

        // Show question or answer depending on state
        document.getElementById("card-text").innerText =
            showingAnswer
                ? cards[index].answer
                : cards[index].question;
    }


    // ================= FLIP CARD =================
    function flipCard() {
        showingAnswer = !showingAnswer; // toggle state
        displayCard();
    }


    // ================= NEXT CARD =================
    function nextCard() {
        if (index < cards.length - 1) {
            index++;                 // move forward
            showingAnswer = false;   // reset to question
            displayCard();
        }
    }


    // ================= PREVIOUS CARD =================
    function prevCard() {
        if (index > 0) {
            index--;                 // move backward
            showingAnswer = false;   // reset to question
            displayCard();
        }
    }


    // ================= INITIAL LOAD =================
    // Run once when page loads
    displayCard();

</script>

</body>
</html>
